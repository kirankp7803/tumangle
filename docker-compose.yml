version: '3.8'

services:
  tumangle-app-v4:
    build: .
    container_name: tumangle-server-v4
    ports:
      - "3002:3000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - tumangle_data:/app/data
    restart: unless-stopped

volumes:
  tumangle_data:
