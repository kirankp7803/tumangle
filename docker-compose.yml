version: '3.8'

services:
  tumangle-app:
    build: .
    container_name: tumangle-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/database.sqlite
    volumes:
      - tumangle_data:/app/data
    restart: unless-stopped

volumes:
  tumangle_data:
